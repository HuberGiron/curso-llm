<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2d3748" /></marker></defs>
<style>text{font-family: Arial, sans-serif; font-size: 14px;}.title{font-size:24px;font-weight:bold}.box{fill:#f8fafc;stroke:#2d3748;stroke-width:1.5;rx:14}.sub{font-size:12px;fill:#4a5568}.lbl{font-weight:bold}</style>
<text x="30" y="40" class="title">Pipeline VLM para decisión robótica</text>
<rect x="40" y="130" width="180" height="100" class="box" rx="14"/>
<text x="130.0" y="160" text-anchor="middle" class="lbl">Imagen / Sensor</text>
<text x="130.0" y="185" text-anchor="middle" class="sub">cámara, captura o frame</text>
<rect x="270" y="130" width="200" height="100" class="box" rx="14"/>
<text x="370.0" y="160" text-anchor="middle" class="lbl">VLM / LLM visión</text>
<text x="370.0" y="185" text-anchor="middle" class="sub">descripción y razonamiento</text>
<rect x="530" y="130" width="200" height="100" class="box" rx="14"/>
<text x="630.0" y="160" text-anchor="middle" class="lbl">Salida estructurada</text>
<text x="630.0" y="185" text-anchor="middle" class="sub">JSON con estado/acción</text>
<rect x="790" y="130" width="210" height="100" class="box" rx="14"/>
<text x="895.0" y="160" text-anchor="middle" class="lbl">Acción</text>
<text x="895.0" y="185" text-anchor="middle" class="sub">robot, alerta o recomendación</text>
<rect x="530" y="320" width="200" height="100" class="box" rx="14"/>
<text x="630.0" y="350" text-anchor="middle" class="lbl">Confiabilidad</text>
<text x="630.0" y="375" text-anchor="middle" class="sub">incertidumbre y validación</text>
<line x1="220" y1="180.0" x2="270" y2="180.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="245.0" y="172.0" text-anchor="middle" class="sub">entrada multimodal</text>
<line x1="470" y1="180.0" x2="530" y2="180.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="500.0" y="172.0" text-anchor="middle" class="sub">clasificación/estado</text>
<line x1="730" y1="180.0" x2="790" y2="180.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="760.0" y="172.0" text-anchor="middle" class="sub">comando</text>
<line x1="730" y1="180.0" x2="530" y2="370.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="630.0" y="267.0" text-anchor="middle" class="sub">auditoría</text>
</svg>