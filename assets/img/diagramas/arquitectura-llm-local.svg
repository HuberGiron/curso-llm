<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2d3748" /></marker></defs>
<style>text{font-family: Arial, sans-serif; font-size: 14px;}.title{font-size:24px;font-weight:bold}.box{fill:#f8fafc;stroke:#2d3748;stroke-width:1.5;rx:14}.sub{font-size:12px;fill:#4a5568}.lbl{font-weight:bold}</style>
<text x="30" y="40" class="title">Arquitectura base: LLM local como servicio</text>
<rect x="40" y="120" width="180" height="100" class="box" rx="14"/>
<text x="130.0" y="150" text-anchor="middle" class="lbl">Usuario</text>
<text x="130.0" y="175" text-anchor="middle" class="sub">instrucción en lenguaje natural</text>
<rect x="280" y="120" width="200" height="100" class="box" rx="14"/>
<text x="380.0" y="150" text-anchor="middle" class="lbl">Frontend</text>
<text x="380.0" y="175" text-anchor="middle" class="sub">HTML · CSS · JS</text>
<rect x="540" y="120" width="220" height="100" class="box" rx="14"/>
<text x="650.0" y="150" text-anchor="middle" class="lbl">Backend Python</text>
<text x="650.0" y="175" text-anchor="middle" class="sub">FastAPI/Flask</text>
<text x="650.0" y="193" text-anchor="middle" class="sub">validación y métricas</text>
<rect x="820" y="120" width="220" height="100" class="box" rx="14"/>
<text x="930.0" y="150" text-anchor="middle" class="lbl">Ollama</text>
<text x="930.0" y="175" text-anchor="middle" class="sub">modelo local</text>
<text x="930.0" y="193" text-anchor="middle" class="sub">/api/generate /api/chat</text>
<rect x="540" y="300" width="220" height="100" class="box" rx="14"/>
<text x="650.0" y="330" text-anchor="middle" class="lbl">Registro</text>
<text x="650.0" y="355" text-anchor="middle" class="sub">latencia · tokens · errores</text>
<line x1="220" y1="170.0" x2="280" y2="170.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="250.0" y="162.0" text-anchor="middle" class="sub">prompt</text>
<line x1="480" y1="170.0" x2="540" y2="170.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="510.0" y="162.0" text-anchor="middle" class="sub">HTTP</text>
<line x1="760" y1="170.0" x2="820" y2="170.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="790.0" y="162.0" text-anchor="middle" class="sub">REST local</text>
<line x1="760" y1="170.0" x2="540" y2="350.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="650.0" y="252.0" text-anchor="middle" class="sub">logs</text>
</svg>