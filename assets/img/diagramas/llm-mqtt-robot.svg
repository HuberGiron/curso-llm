<line x1="710" y1="180.0" x2="760" y2="180.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
<text x="735.0" y="172.0" text-anchor="middle" class="sub">comando</text>
<line x1="990" y1="180.0" x2="760" y2="370.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
