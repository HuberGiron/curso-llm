<text x="375.0" y="375" text-anchor="middle" class="sub">éxito · latencia · seguridad</text>
<line x1="230" y1="180.0" x2="280" y2="180.0" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>
