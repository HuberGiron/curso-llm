<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatbot LLM local</title>
  <style>
    body{font-family:system-ui,Arial;margin:2rem;max-width:900px} textarea{width:100%;height:100px}
    button{padding:.7rem 1rem;margin-top:.5rem} pre{background:#f4f4f4;padding:1rem;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>Chatbot LLM local</h1>
  <textarea id="prompt">Dame un comando JSON para mover un robot al centro.</textarea><br>
  <button onclick="sendPrompt()">Enviar</button>
  <pre id="out">Esperando...</pre>
  <script>
    async function sendPrompt(){
      const prompt = document.getElementById('prompt').value;
      const res = await fetch('http://localhost:8000/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({prompt, temperature:0.2, max_tokens:256})
      });
      document.getElementById('out').textContent = JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
