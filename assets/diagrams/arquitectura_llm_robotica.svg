<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker></defs>
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#111827">Arquitectura LLM → Planner → Robot</text>
  <g font-family="Arial" font-size="17" fill="#111827">
    <rect x="50" y="100" width="180" height="95" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="75" y="135" font-weight="700">Instrucción humana</text><text x="75" y="165">Lenguaje natural</text>
    <rect x="300" y="80" width="220" height="135" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="333" y="118" font-weight="700">LLM / Agente</text><text x="333" y="150">Prompt + contexto</text><text x="333" y="178">JSON estructurado</text>
    <rect x="590" y="80" width="210" height="135" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="625" y="118" font-weight="700">Capa de seguridad</text><text x="625" y="150">Validación de schema</text><text x="625" y="178">Límites y permisos</text>
    <rect x="870" y="80" width="220" height="135" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="930" y="118" font-weight="700">Planner</text><text x="910" y="150">Trayectoria / acción</text><text x="910" y="178">Referencia temporal</text>
    <rect x="180" y="330" width="230" height="115" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="228" y="370" font-weight="700">Broker MQTT</text><text x="214" y="402">topics, QoS, estado</text>
    <rect x="510" y="330" width="230" height="115" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="563" y="370" font-weight="700">Robot virtual</text><text x="548" y="402">canvas / simulación</text>
    <rect x="840" y="330" width="230" height="115" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="895" y="370" font-weight="700">Robot físico</text><text x="882" y="402">ESP32 / actuadores</text>
  </g>
  <g stroke="#111827" stroke-width="2.4" fill="none" marker-end="url(#a)">
    <path d="M230 148 H300"/><path d="M520 148 H590"/><path d="M800 148 H870"/>
    <path d="M980 215 C980 260 300 260 300 330"/><path d="M410 388 H510"/><path d="M740 388 H840"/>
    <path d="M625 330 C620 270 980 270 980 215" stroke-dasharray="7 5"/>
  </g>
  <text x="520" y="505" font-family="Arial" font-size="15" fill="#475569">El LLM no debe mandar voltajes o velocidades directamente: primero genera intención, luego un validador/planner traduce a acciones seguras.</text>
</svg>
