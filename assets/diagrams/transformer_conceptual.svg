<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500">
  <rect width="1100" height="500" fill="#f8fafc"/>
  <text x="40" y="45" font-family="Arial" font-size="26" font-weight="700">Flujo conceptual de un Transformer generativo</text>
  <g font-family="Arial" font-size="16" fill="#111827">
    <rect x="70" y="95" width="180" height="95" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="115" y="130" font-weight="700">Texto</text><text x="93" y="160">prompt del usuario</text>
    <rect x="310" y="95" width="180" height="95" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="360" y="130" font-weight="700">Tokens</text><text x="336" y="160">IDs discretos</text>
    <rect x="550" y="95" width="190" height="95" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="585" y="130" font-weight="700">Embeddings</text><text x="582" y="160">vectores densos</text>
    <rect x="800" y="80" width="230" height="125" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="850" y="118" font-weight="700">Bloques Transformer</text><text x="833" y="150">self-attention + MLP</text><text x="833" y="178">residual + normalización</text>
    <rect x="430" y="300" width="250" height="110" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="480" y="340" font-weight="700">Distribución del siguiente token</text><text x="470" y="372">temperatura, top-p, top-k</text>
  </g>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker></defs>
  <g stroke="#111827" stroke-width="2.2" fill="none" marker-end="url(#arr)">
    <path d="M250 142 H310"/><path d="M490 142 H550"/><path d="M740 142 H800"/><path d="M915 205 C915 275 680 275 620 300"/><path d="M430 355 C280 350 160 260 160 190" stroke-dasharray="8 5"/>
  </g>
  <text x="80" y="455" font-family="Arial" font-size="15" fill="#475569">La generación es autoregresiva: cada token nuevo se agrega al contexto y vuelve a pasar por el modelo.</text>
</svg>
