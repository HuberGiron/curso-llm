title: Prospectiva Tecnológica IA + LLM + Robótica
description: Curso académico sobre prospectiva tecnológica aplicada al uso de IA generativa, LLM, agentes y automatización en robótica.

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

url: "https://hubergiron.github.io"
baseurl: "/curso-llm"

just_the_docs:
  custom_css:
    - "assets/css/custom.css"
  footer_content: ""

search_enabled: true
search:
  heading_level: 3

aux_links:
  "Repositorio en GitHub":
    - "https://github.com/HuberGiron/curso-llm"

permalink: pretty

callouts:
  objetivo:
    title: Objetivo de aprendizaje
    color: blue
  practica:
    title: Práctica guiada
    color: green
  evidencia:
    title: Evidencia esperada
    color: purple
  advertencia:
    title: Cuidado técnico
    color: red
  lectura:
    title: Lectura académica
    color: yellow

exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"
  - "README_DEV.md"
